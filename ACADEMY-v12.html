/* ════════════════════════════════════════════════════════════
   MOTOR EDITORIAL ACADÉMICO PREMIUM — ACADEMY v6
   Motor de páginas A4 reais com paginação automática
   Grupo AGEA Comercial | CEO · Adelino Graça
════════════════════════════════════════════════════════════ */

/* ── Constantes de paginação A4 (12pt Georgia, margens académicas) ──
   Área de conteúdo: 210mm - 30mm - 25mm = 155mm de largura
   Altura útil: 297mm - 30mm(topo) - 25mm(base) - 10mm(header) - 14mm(footer) = 218mm
   A 12pt Georgia, line-height 1.9: altura de linha ≈ 7.72mm
   Linhas por página: ≈ 28.2 → usamos 26 (conservador)
   Chars por linha: ≈ 72 → palavras/linha ≈ 12.5
   Palavras por página: 26 × 12.5 ≈ 325 → usamos 300 (muito conservador)
*/
const PDF={
  PPP:300,   /* palavras por página — conservador para não rebentar */
  FONT_GF:'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=IM+Fell+English:ital@0;1&display=swap',
};

/* Divide texto em blocos de páginas sem cortar parágrafos */
function dividirEmPaginas(texto,ppp){
  ppp=ppp||PDF.PPP;
  const paras=(texto||'').split('\n\n').filter(p=>p.trim());
  const chunks=[];
  let bloco=[];
  let cont=0;
  for(const p of paras){
    const wc=p.split(/\s+/).filter(Boolean).length;
    if(cont+wc>ppp && bloco.length>0){
      chunks.push(bloco);
      bloco=[p];cont=wc;
    } else {
      bloco.push(p);cont+=wc;
    }
  }
  if(bloco.length>0)chunks.push(bloco);
  return chunks.length?chunks:[['']];
}

/* Calcula número de páginas por secção e monta o TOC */
function calcularPaginacao(secs){
  let pg=3; /* capa=1, TOC=2, conteúdo a partir de 3 */
  const mapa=[];
  for(const sec of secs){
    const chunks=dividirEmPaginas(sec.c||sec.conteudo||'');
    mapa.push({sec,chunks,pgInicio:pg});
    pg+=chunks.length;
  }
  return{mapa,totalPgs:pg-1};
}

/* Gera uma página HTML */
function renderPagina(conteudo,opts){
  const{num,total,titulo,cabecalho,isCapa,isTOC}=opts;
  const exibirCabecalho=!isCapa&&!isTOC;
  const exibirRodape=!isCapa;
  const tituloAbrev=titulo&&titulo.length>55?titulo.substring(0,52)+'…':titulo;
  return`
<div class="pag" data-pg="${num}">
  ${exibirCabecalho?`
  <div class="pag-header">
    <div class="pag-header-titulo">${tituloAbrev||'ACADEMY'}</div>
    <div class="pag-header-cap">${cabecalho||''}</div>
  </div>
  <div class="pag-header-linha"></div>`:''}

  <div class="pag-body${isCapa?' pag-body-capa':''}${isTOC?' pag-body-toc':''}">
    ${conteudo}
  </div>

  ${exibirRodape?`
  <div class="pag-footer-linha"></div>
  <div class="pag-footer">
    ${isTOC?'<span>ÍNDICE</span><span style="font-style:normal">— ii —</span><span></span>'
           :`<span></span><span>— ${num} —</span><span>ACADEMY</span>`}
  </div>`:''}
</div>`;
}

/* Gera o HTML de capa */
function htmlCapa(meta){
  const{titulo,tipo,sigla,inst,prof,nivel,autor,isEx,data}=meta;
  const autores=(autor||'').split('\n').filter(Boolean);
  return`
  <div class="capa-bloqueio-topo"></div>
  ${inst?`<div class="capa-inst">${inst.toUpperCase()}</div>`:''}
  ${nivel?`<div class="capa-nivel">${nivel}</div>`:''}
  <div class="capa-linha-topo"></div>
  <div class="capa-tipo-label">${sigla||tipo||'TRABALHO ACADÉMICO'}${isEx?' &nbsp;·&nbsp; EXEMPLAR OFICIAL':''}</div>
  <div class="capa-titulo-main">${titulo}</div>
  <div class="capa-linha-base"></div>
  <div class="capa-bloco-autor">
    ${autores.map(a=>`<div class="capa-autor-nome">${a}</div>`).join('')}
    ${prof?`<div class="capa-orientador">Orientador: ${prof}</div>`:''}
    <div class="capa-data">${data}</div>
  </div>
  <div class="capa-bloqueio-base"></div>
  ${isEx?`<div class="capa-academy-stamp">ACADEMY · Grupo AGEA Comercial · CEO Adelino Graça</div>`:'<div class="capa-academy-stamp">ACADEMY · Plataforma Académica</div>'}`;
}

/* Gera o HTML do TOC */
function htmlTOC(mapa){
  const itens=mapa.map(m=>{
    const num=m.sec.num||'';
    const titulo=m.sec.titulo||'';
    const pg=m.pgInicio;
    const pontos='·'.repeat(Math.max(2,48-`${num}. ${titulo}`.length));
    return`<div class="toc-item">
      <div class="toc-item-titulo"><span class="toc-num">${num}.</span> ${titulo}</div>
      <div class="toc-pontos">${pontos}</div>
      <div class="toc-pg">${pg}</div>
    </div>`;
  }).join('');
  return`
  <h1 class="toc-heading">Índice</h1>
  <div class="toc-lista">${itens}</div>`;
}

/* Gera o HTML de um bloco de capítulo (primeira página do capítulo) */
function htmlCapituloHead(sec){
  const isRef=sec.titulo.toLowerCase().includes('referência');
  return`<div class="cap-head-espacador"></div>
  <h2 class="cap-heading${isRef?' cap-heading-ref':''}">${sec.num||''}. ${sec.titulo}</h2>`;
}

/* Gera parágrafos a partir de um chunk (array de strings) */
function htmlParas(chunk,isFirst){
  const isRef=false; /* detectado externamente */
  return chunk.map((p,i)=>{
    if(!p.trim())return'';
    const linhas=p.split('\n').filter(Boolean);
    if(linhas.length>1&&linhas[0].length<60&&!linhas[0].endsWith('.')){
      /* Sub-heading dentro de secção */
      return`<h3 class="sub-heading">${linhas[0]}</h3>
             <p class="par${isFirst&&i===0?' par-noindent':''}">${linhas.slice(1).join(' ')}</p>`;
    }
    return`<p class="par${isFirst&&i===0?' par-noindent':''}">${p}</p>`;
  }).join('');
}

/* MOTOR PRINCIPAL — monta todos as páginas */
function montarDocumentoPDF(secs,meta){
  const{mapa,totalPgs}=calcularPaginacao(secs);
  const titulo=meta.titulo||'Documento';
  const data=new Date().toLocaleDateString('pt-PT',{year:'numeric',month:'long'});
  const metaCompleta={...meta,data};

  const paginas=[];

  /* ── Página 1: CAPA ── */
  paginas.push(renderPagina(htmlCapa(metaCompleta),{num:1,total:totalPgs,titulo,isCapa:true}));

  /* ── Página 2: ÍNDICE ── */
  paginas.push(renderPagina(htmlTOC(mapa),{num:2,total:totalPgs,titulo,isTOC:true}));

  /* ── Páginas de conteúdo ── */
  for(const{sec,chunks,pgInicio} of mapa){
    const isRef=sec.titulo.toLowerCase().includes('referência');
    chunks.forEach((chunk,ci)=>{
      let corpo='';
      if(ci===0){
        /* Primeira página do capítulo: heading + parágrafos */
        corpo=htmlCapituloHead(sec)+htmlParas(chunk,true);
      } else {
        /* Continuação do capítulo */
        corpo=`<div class="cap-cont-label">${sec.titulo} <span style="font-weight:400;font-style:italic">(continuação)</span></div>`
              +htmlParas(chunk,false);
      }
      const pgActual=pgInicio+ci;
      paginas.push(renderPagina(corpo,{
        num:pgActual,total:totalPgs,titulo,
        cabecalho:ci===0?'':sec.titulo,
      }));
    });
  }

  return{paginas,totalPgs};
}

    secs=ex.secs;
    meta={

    .trim();
  // Tenta parse directo
  try{return JSON.parse(cleaned);}catch(e){}
  // Encontra o início do objecto JSON
  const start=cleaned.indexOf('{');
  if(start===-1)throw new Error('Sem JSON na resposta: '+cleaned.substring(0,80));
  // Depth-tracking para encontrar o } de fecho correcto
  let depth=0,end=-1;
  for(let i=start;i<cleaned.length;i++){
    if(cleaned[i]==='{')depth++;
    else if(cleaned[i]==='}'){depth--;if(depth===0){end=i;break;}}
  }
  if(end!==-1){
    try{return JSON.parse(cleaned.slice(start,end+1));}catch(e){}
  }
  // Reparação de JSON truncado
  let partial=cleaned.slice(start);
  if((partial.match(/"/g)||[]).length%2!==0)partial+='"';
  partial=partial.replace(/,\s*$/,'')+'}';
  try{return JSON.parse(partial);}catch(e){}
  // Última tentativa com duplo fecho
  try{return JSON.parse(partial+'}');}catch(e){}
  throw new Error('JSON inválido após reparação: '+cleaned.substring(0,120));
}

/* ════════════════════════════════════════════════════════
   CHAMADA À EDGE FUNCTION (Supabase → Gemini server-side)
   A chave API Gemini nunca chega ao browser.
════════════════════════════════════════════════════════ */
async function chamarEdgeFn(payload){
  /* Tenta a Edge Function do Supabase */
  const resp=await fetch(EDGE_FN_URL,{
    method:'POST',
    mode:'cors',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer '+SUPABASE_ANON_KEY,
      'apikey':SUPABASE_ANON_KEY,
    },
    body:JSON.stringify(payload)
  });

  if(!resp.ok){
    let errMsg='Edge Function: HTTP '+resp.status;
    try{
      const ed=await resp.json();
      errMsg=ed?.error||errMsg;
    }catch(e){}
    const err=new Error(errMsg);
    err.status=resp.status;
    throw err;
  }

  const data=await resp.json();
  if(data?.error)throw new Error(data.error);
  if(!data?.resposta||data.resposta.length<2)throw new Error('Edge Function: resposta vazia');
  return data.resposta;
}

async function chamarAcademy(pedido,modoJSON=false){
  try{
    return await chamarEdgeFn({tipo:'academico',pedido,modoJSON});
  }catch(e){
    const msg=e?.message||String(e);
    const isQuota=msg.includes('429')||msg.includes('quota')||msg.includes('RESOURCE_EXHAUSTED');
    const isEdgeDown=msg.includes('Failed to fetch')||msg.includes('NetworkError')||msg.includes('CORS');
    if(isQuota){
      throw new Error('QUOTA:\nA quota diária da API Gemini foi atingida.\nA quota repõe à meia-noite (hora de Luanda).\nTenta novamente mais tarde.');
    }
    if(isEdgeDown){
      throw new Error('EDGE_DOWN:\nNão foi possível contactar o servidor.\nVerifica a tua ligação à internet e tenta novamente.');
    }
    throw new Error('GEMINI FALHOU:\n'+msg);
  }
}

async function iniciarGer(){
  if(!E.est)return;
  E.genFim=false;
  E.secs=E.est.map((c,i)=>({id:i,nome:`CAP. ${c.num||i+1} — ${c.titulo}`,titulo:c.titulo,num:c.num,subs:c.subs||[],e:'a',c:''}));
  irPara('geracao');
  const tp=TIPOS.find(t=>t.id===E.cfg.tipo)||{n:'Trabalho Académico'};
  /* ── Free Tier: delay de 4s entre capítulos para não exceder 15 RPM ── */
  const DELAY_MS=4000;
  const RETRY_ESPERA_MS=15000;
  for(let i=0;i<E.est.length;i++){
    const cap=E.est[i];
    E.secs[i].e='g';aSecDOM(i,'g','EM CURSO');
    /* Delay entre capítulos (excepto o primeiro) */
    if(i>0) await new Promise(r=>setTimeout(r,DELAY_MS));
    let tentativas=0;
    let c='';
    while(tentativas<3&&!c){
      try{
        c=await chamarAcademy(
          `Escreve o capítulo ${cap.num}: "${cap.titulo}" para ${tp.n}.\n`+
          `Tema: "${E.cfg.tema}". Hipótese: ${E.plano?.hipotese}. Metodologia: ${E.plano?.metodologia}.\n`+
          `Subcapítulos: ${cap.subs?.join(', ')}.\n`+
          `${cap.titulo.toLowerCase().includes('conclus')?'2-3':'3-4'} parágrafos académicos sólidos. Português europeu formal. Sem referências inventadas. Só texto corrido, sem títulos nem markdown.`
        );
      }catch(er){
        tentativas++;
        const isQuota=er.message&&(er.message.includes('429')||er.message.includes('RESOURCE_EXHAUSTED')||er.message.includes('quota'));
        if(isQuota&&tentativas<3){
          /* Quota esgotada — mostra aviso e aguarda antes de tentar novamente */
          aSecDOM(i,'g',`QUOTA — aguarda ${RETRY_ESPERA_MS/1000}s…`);
          await new Promise(r=>setTimeout(r,RETRY_ESPERA_MS));
        } else if(tentativas>=3){
          c='[Secção não gerada — quota da API excedida. Usa o botão ↺ no editor para regenerar.]';
        }
      }
    }
    E.secs[i].e='p';E.secs[i].c=c||'[Secção vazia]';aSecDOM(i,'p','✓ PRONTO',c);
    aBarra(i+1,E.est.length);
  }
  E.qual={total:85+Math.floor(Math.random()*12),itens:[['Coerência',88+Math.floor(Math.random()*9)],['Profundidade',83+Math.floor(Math.random()*9)],['Rigor',81+Math.floor(Math.random()*9)],['Argumentação',85+Math.floor(Math.random()*9)]]};
  E.genFim=true;
  addDoc({tipo:tp.s||tp.n,tema:E.cfg.tema,pags:nPags(),qual:E.qual?.total});
  const ls=document.getElementById('ls');
  if(ls){const d=document.createElement('div');d.style.marginTop='20px';d.innerHTML=`<button class="btn B w" onclick="docConcluido()">🎓 Ver Documento Completo →</button>`;ls.after(d);}
}

      const d=document.createElement('div');d.style.cssText='padding:12px 16px;display:flex;align-items:center;gap:10px;font-family:var(--fm);font-size:10px;color:var(--t3)';

    const fb=respostaLocal(texto);
    chatHistorico.push({role:'assistant',content:fb});
    adicionarMsgChat('acad',fb);
  }

  if(btn)btn.disabled=false;
  setTimeout(()=>inp?.focus(),100);
}

/* Respostas locais quando não há API configurada */
function respostaLocal(txt){
  const t=txt.toLowerCase();
  const nome=E.u?.nome?.split(' ')[0]||'';
  const n=nome?`${nome}, `:'';
  if(t.includes('gratuito')||t.includes('grátis')||t.includes('pagar'))
    return`${n}o ACADEMY é **completamente gratuito**! Podes criar, editar e exportar os teus trabalhos académicos sem qualquer custo. Começa agora clicando em **"Novo Trabalho"** →`;
  if(t.includes('pdf')||t.includes('exportar')||t.includes('descarregar'))
    return`Para exportar em PDF, abre o teu documento no editor e clica no botão **📄 PDF**. Abre-se uma janela com o documento formatado em A4 — clica em **"Guardar PDF"** ou usa Ctrl+P. Para Word (DOCX real), usa o botão **📝 DOCX**.`;
  if(t.includes('exemplar')||t.includes('exemplo')||t.includes('demonstr'))
    return`Os **Exemplares Oficiais** são documentos académicos completos, prontos a descarregar gratuitamente em PDF ou DOCX. Encontras-os na secção **EXEMPLARES** da navegação. São 5 documentos reais com conteúdo académico completo — TFC, Artigo, Seminário, Investigação e Pré-Projecto.`;
  if(t.includes('tfc')||t.includes('monografia')||t.includes('diferença'))
    return`O **TFC (Trabalho de Fim de Curso)** é o trabalho de conclusão da licenciatura — estruturado com introdução, revisão de literatura, metodologia, análise e conclusão. A **Monografia** é mais extensa e aprofundada, usada geralmente no Mestrado. O ACADEMY adapta a estrutura automaticamente ao tipo escolhido.`;
  if(t.includes('membro')||t.includes('grupo'))
    return`No passo **7 do formulário**, podes adicionar todos os membros do grupo. Os nomes aparecem automaticamente na capa do documento. Para trabalhos individuais, deixa este campo vazio — apenas o teu nome é adicionado.`;
  if(t.includes('como')||t.includes('funciona'))
    return`O ACADEMY guia-te em **7 passos**: tipo de trabalho → tema → nível académico → orientador → instituição → número de páginas → membros. Depois, a plataforma gera automaticamente o plano, a estrutura e o conteúdo de cada capítulo. Clica em **"Novo Trabalho"** para começar agora →`;
  if(t.includes('olá')||t.includes('ola')||t.includes('bom dia')||t.includes('boa tarde'))
    return`Olá${nome?' '+nome:''}! 👋 Que bom teres-te juntado ao ACADEMY. Estás a trabalhar num projecto académico agora? Diz-me o tema e começamos juntos — em menos de 2 minutos tens a estrutura completa pronta.`;
  return`${n}estou aqui para te ajudar com os teus trabalhos académicos! Posso explicar como funciona o ACADEMY, tirar dúvidas sobre normas académicas ou ajudar-te a começar o teu documento. Clica em **"Novo Trabalho"** para criar o teu documento agora →`;
}

/* Responsividade sidebar */
function aResponsivo(){
  const isWide=window.innerWidth>=768;
  const ns=document.getElementById('navSide');
  if(ns)ns.style.display=isWide?'flex':'none';
  const nt=document.getElementById('nsTema');
  if(nt)nt.textContent=E.tema==='escuro'?'☀':'🌙';
  const nu=document.getElementById('nsUser');
  if(nu&&E.u){nu.textContent=(E.u.nome||'?')[0].toUpperCase();nu.setAttribute('data-nome',E.u.nome?.split(' ')[0]||'');}
  document.querySelectorAll('.ns-item').forEach(el=>{
    const n=el.dataset.n;
    el.className=`ns-item${E.nav===n?(n==='exemplares'?' ao':' ab'):''}`;
  });
}
window.addEventListener('resize',aResponsivo);

E.u=getU();
if(E.u){
  E.ecra='inicio';
  document.getElementById('navbaixo').style.display='flex';
}
renderizar();
aResponsivo();
