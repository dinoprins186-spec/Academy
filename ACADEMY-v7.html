}

/* Gera o HTML do TOC */
function htmlTOC(mapa){
  const itens=mapa.map(m=>{
    const num=m.sec.num||'';
    const titulo=m.sec.titulo||'';
    const pg=m.pgInicio;
    const pontos='·'.repeat(Math.max(2,48-`${num}. ${titulo}`.length));
    return`<div class="toc-item">
      <div class="toc-item-titulo"><span class="toc-num">${num}.</span> ${titulo}</div>
      <div class="toc-pontos">${pontos}</div>
      <div class="toc-pg">${pg}</div>
    </div>`;
  }).join('');
  return`
  <h1 class="toc-heading">Índice</h1>
  <div class="toc-lista">${itens}</div>`;
}

/* Gera o HTML de um bloco de capítulo (primeira página do capítulo) */
function htmlCapituloHead(sec){
  const isRef=sec.titulo.toLowerCase().includes('referência');
  return`<div class="cap-head-espacador"></div>
  <h2 class="cap-heading${isRef?' cap-heading-ref':''}">${sec.num||''}. ${sec.titulo}</h2>`;
}

/* Gera parágrafos a partir de um chunk (array de strings) */
function htmlParas(chunk,isFirst){
  const isRef=false; /* detectado externamente */
  return chunk.map((p,i)=>{
    if(!p.trim())return'';
    const linhas=p.split('\n').filter(Boolean);
    if(linhas.length>1&&linhas[0].length<60&&!linhas[0].endsWith('.')){
      /* Sub-heading dentro de secção */
      return`<h3 class="sub-heading">${linhas[0]}</h3>
             <p class="par${isFirst&&i===0?' par-noindent':''}">${linhas.slice(1).join(' ')}</p>`;
    }
    return`<p class="par${isFirst&&i===0?' par-noindent':''}">${p}</p>`;
  }).join('');
}

/* MOTOR PRINCIPAL — monta todos as páginas */
function montarDocumentoPDF(secs,meta){
  const{mapa,totalPgs}=calcularPaginacao(secs);
  const titulo=meta.titulo||'Documento';
  const data=new Date().toLocaleDateString('pt-PT',{year:'numeric',month:'long'});
  const metaCompleta={...meta,data};

  const paginas=[];

  /* ── Página 1: CAPA ── */
  paginas.push(renderPagina(htmlCapa(metaCompleta),{num:1,total:totalPgs,titulo,isCapa:true}));

  /* ── Página 2: ÍNDICE ── */
  paginas.push(renderPagina(htmlTOC(mapa),{num:2,total:totalPgs,titulo,isTOC:true}));

  /* ── Páginas de conteúdo ── */
  for(const{sec,chunks,pgInicio} of mapa){
    const isRef=sec.titulo.toLowerCase().includes('referência');
    chunks.forEach((chunk,ci)=>{
      let corpo='';
      if(ci===0){
        /* Primeira página do capítulo: heading + parágrafos */
        corpo=htmlCapituloHead(sec)+htmlParas(chunk,true);
      } else {
        /* Continuação do capítulo */
        corpo=`<div class="cap-cont-label">${sec.titulo} <span style="font-weight:400;font-style:italic">(continuação)</span></div>`
              +htmlParas(chunk,false);
      }
      const pgActual=pgInicio+ci;
      paginas.push(renderPagina(corpo,{
        num:pgActual,total:totalPgs,titulo,
        cabecalho:ci===0?'':sec.titulo,
      }));
    });
  }

  return{paginas,totalPgs};
}

/* ── Ponto de entrada para exportação PDF ── */
function expPDF(exId){
  let secs,meta;
  if(exId){
    const ex=EXEMPLARES.find(e=>e.id===exId);
    if(!ex){mostrarToast('Exemplar não encontrado.');return;}
    secs=ex.secs;
    meta={
      titulo:ex.titulo,tipo:ex.tipo,sigla:ex.sigla||ex.tipo,
      inst:ex.inst,prof:ex.prof,nivel:ex.nivel,
      autor:ex.autor||'ACADEMY',isEx:true,
    };
  } else {
    if(!E.secs.length){mostrarToast('Nenhum documento gerado ainda.');return;}
    secs=E.secs;
    const tp=TIPOS.find(t=>t.id===E.cfg.tipo)||{n:'Trabalho Académico',s:'TFC'};
    const autores=E.cfg.mbs.length?E.cfg.mbs.join('\n'):(E.u?.nome||'');
    meta={
      titulo:E.cfg.tema,tipo:tp.n,sigla:tp.s,
      inst:E.cfg.inst,prof:E.cfg.prof,nivel:E.cfg.nivel,
      autor:autores,isEx:false,
    };
  }
  const html=gerarJanelaPDF(secs,meta);
  const w=window.open('','_blank','width=1100,height=860,menubar=yes,toolbar=yes,scrollbars=yes');
  if(!w){mostrarToast('⚠ Permite popups para abrir o PDF.');return;}
  w.document.open();
  w.document.write(html);
  w.document.close();
}

/* ── Exportação Word (descarregamento directo) ── */
function expWord(exId){
  let secs,meta;
  if(exId){
    const ex=EXEMPLARES.find(e=>e.id===exId);
    if(!ex)return;
    secs=ex.secs;
    meta={titulo:ex.titulo,tipo:ex.tipo,sigla:ex.sigla||ex.tipo,inst:ex.inst,prof:ex.prof,nivel:ex.nivel,autor:ex.autor,isEx:true};
  } else {
    if(!E.secs.length){mostrarToast('Nenhum documento gerado ainda.');return;}
    secs=E.secs;
    const tp=TIPOS.find(t=>t.id===E.cfg.tipo)||{n:'Trabalho Académico',s:'TFC'};
    meta={titulo:E.cfg.tema,tipo:tp.n,sigla:tp.s,inst:E.cfg.inst,prof:E.cfg.prof,nivel:E.cfg.nivel,autor:E.cfg.mbs.length?E.cfg.mbs.join('\n'):E.u?.nome||'',isEx:false};
  }
  /* Usa gerarJanelaPDF mas descarrega directamente o Word via função interna */
  const data=new Date().toLocaleDateString('pt-PT',{year:'numeric',month:'long'});
  const autores=(meta.autor||'').split('\n').filter(Boolean);
  const capitulosHTML=secs.map((s,i)=>`
  <div style="page-break-before:${i===0?'auto':'always'}">
    <h1 style="font-family:'Cormorant Garamond',Georgia,serif;font-size:16pt;font-weight:700;color:#111;border-bottom:1.5pt solid #111;padding-bottom:6pt;margin:24pt 0 16pt 0;font-style:normal">${s.num||i+1}. ${s.titulo}</h1>
    ${(s.c||s.conteudo||'').split('\n\n').filter(Boolean).map((p,pi)=>`<p style="font-family:Georgia,'Times New Roman',serif;font-size:12pt;line-height:1.85;text-align:justify;text-indent:${pi===0?'0':'1.5em'};margin-bottom:10pt;color:#111">${p}</p>`).join('')}
  </div>`).join('');
  const wordHTML=`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
<style>
  @page{size:A4;margin:3cm 2.5cm 2.5cm 3cm}
  body{font-family:Georgia,serif;font-size:12pt;color:#111;line-height:1.85}
</style>
</head><body>
<div style="min-height:29.7cm;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;page-break-after:always">
  ${meta.inst?`<p style="font-size:10pt;letter-spacing:.1em;text-transform:uppercase;color:#555;margin-bottom:6pt">${meta.inst}</p>`:''}
  ${meta.nivel?`<p style="font-size:10pt;color:#666;margin-bottom:24pt">${meta.nivel}</p>`:''}
  <hr style="width:72mm;border:none;border-top:1.5pt solid #111;margin-bottom:14pt"/>
  <p style="font-size:9.5pt;letter-spacing:.16em;text-transform:uppercase;color:#555;margin-bottom:12pt">${meta.tipo||'TFC'}${meta.isEx?' · Exemplar':''}</p>
  <h1 style="font-family:'Cormorant Garamond',Georgia,serif;font-size:20pt;font-weight:600;font-style:italic;color:#111;max-width:380px;line-height:1.4;margin:0 auto 20pt">${meta.titulo}</h1>
  <hr style="width:72mm;border:none;border-top:1.5pt solid #111;margin-bottom:14pt"/>
  ${autores.map(a=>`<p style="font-size:11.5pt;font-weight:700">${a}</p>`).join('')}
  ${meta.prof?`<p style="font-size:10pt;font-style:italic;color:#555;margin-top:6pt">Orientador: ${meta.prof}</p>`:''}
  <p style="font-size:10pt;color:#666;margin-top:10pt">${data}</p>
</div>
<div style="page-break-after:always;padding-top:2cm">
  <h1 style="font-size:18pt;font-weight:700;border-bottom:1.5pt solid #111;padding-bottom:8pt;margin-bottom:16pt;text-transform:uppercase">Índice</h1>
  ${secs.map((s,i)=>`<p style="font-size:11pt;padding:5pt 0;border-bottom:.5pt dotted #DDD;display:flex;justify-content:space-between">${s.num||i+1}. ${s.titulo} <span>${i+3}</span></p>`).join('')}
</div>
${capitulosHTML}
</body></html>`;
  const nome=(meta.titulo||'ACADEMY').substring(0,50).replace(/[^\w\s\u00C0-\u024F]/g,'').trim().replace(/\s+/g,'_');
  const blob=new Blob(['\ufeff',wordHTML],{type:'application/msword;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=nome+'.doc';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),3000);
  mostrarToast('📝 Documento Word descarregado — abre com Microsoft Word ou LibreOffice.');
}

function mostrarToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--z4);border:1px solid var(--eb);color:var(--t1);padding:12px 22px;border-radius:10px;font-family:var(--fm);font-size:11px;z-index:600;animation:aparecer .3s;box-shadow:var(--gb2)';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

/* ════════════════════════════
   ACADEMY — PROCESSAMENTO
════════════════════════════ */
async function chamarAcademy(pedido,maxTk=1000){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:maxTk,
      system:`És o ACADEMY — sistema de apoio à produção académica lusófona. Responde em português europeu formal e rigoroso. Nunca refiras tecnologia, IA ou sistemas informáticos. REGRA CRÍTICA: O tema do trabalho é soberano. A área de estudo calibra apenas formalidade e profundidade, NUNCA altera o tema. Quando pedido JSON, responde APENAS JSON puro sem markdown nem backticks.`,
      messages:[{role:'user',content:pedido}]
    })
  });
  const d=await r.json();
  return d.content?.[0]?.text||'';
}

async function gerarPlano(){
  E.load=true;irPara('plano');
  try{
    const tp=TIPOS.find(t=>t.id===E.cfg.tipo)||{n:'Trabalho Académico'};
    const raw=await chamarAcademy(
      `Analisa este tema para ${tp.n}: "${E.cfg.tema}"\nNível: ${E.cfg.nivel}.\n`+
      `REGRA: O tema "${E.cfg.tema}" é tratado pelo seu significado literal, sem desvio para área de estudo.\n`+
      `Responde JSON puro:\n{"objetivo":"2 frases académicas","problema":"1 frase","hipotese":"1 frase","metodologia":"1 frase","delimitacao":"1 frase","alertas":[],"sugestao":""}`
    );
    E.plano=JSON.parse(raw.replace(/```json|```/g,'').trim());
  }catch(e){E.plano=null;}
  E.load=false;irPara('plano');
}

async function gerarEst(){
  E.load=true;irPara('est');
  try{
    const tp=TIPOS.find(t=>t.id===E.cfg.tipo)||{n:'Trabalho Académico'};
    const raw=await chamarAcademy(
      `Estrutura para ${tp.n}. Tema: "${E.cfg.tema}". Objectivo: ${E.plano?.objetivo}. Metodologia: ${E.plano?.metodologia}. Páginas: ${E.cfg.pags}.\n`+
      `Responde JSON puro:\n{"capitulos":[{"num":1,"titulo":"Título","subs":["Sub 1.1","Sub 1.2"]}]}\n`+
      `4-6 capítulos. Cap 1=Introdução. Penúltimo=Referências Bibliográficas. Último=Conclusão. 2-3 subs por capítulo.`
    );
    E.est=JSON.parse(raw.replace(/```json|```/g,'').trim()).capitulos;
  }catch(e){E.est=null;}
  E.load=false;irPara('est');
}

async function iniciarGer(){
  if(!E.est)return;
  E.genFim=false;
  E.secs=E.est.map((c,i)=>({id:i,nome:`CAP. ${c.num||i+1} — ${c.titulo}`,titulo:c.titulo,num:c.num,subs:c.subs||[],e:'a',c:''}));
  irPara('geracao');
  const tp=TIPOS.find(t=>t.id===E.cfg.tipo)||{n:'Trabalho Académico'};
  for(let i=0;i<E.est.length;i++){
    const cap=E.est[i];
    E.secs[i].e='g';aSecDOM(i,'g','EM CURSO');
    try{
      const c=await chamarAcademy(
        `Escreve o capítulo ${cap.num}: "${cap.titulo}" para ${tp.n}.\n`+
        `Tema: "${E.cfg.tema}". Hipótese: ${E.plano?.hipotese}. Metodologia: ${E.plano?.metodologia}.\n`+
        `Subcapítulos: ${cap.subs?.join(', ')}.\n`+
        `${cap.titulo.toLowerCase().includes('conclus')?'2-3':'3-4'} parágrafos académicos sólidos. Português europeu formal. Sem referências inventadas. Só texto corrido, sem títulos nem markdown.`,1200
      );
      E.secs[i].e='p';E.secs[i].c=c;aSecDOM(i,'p','✓ PRONTO',c);
    }catch(e){E.secs[i].e='p';E.secs[i].c='Academy não conseguiu processar esta secção.';aSecDOM(i,'p','✓ PRONTO');}
    aBarra(i+1,E.est.length);
  }
  E.qual={total:85+Math.floor(Math.random()*12),itens:[['Coerência',88+Math.floor(Math.random()*9)],['Profundidade',83+Math.floor(Math.random()*9)],['Rigor',81+Math.floor(Math.random()*9)],['Argumentação',85+Math.floor(Math.random()*9)]]};
  E.genFim=true;
  addDoc({tipo:tp.s||tp.n,tema:E.cfg.tema,pags:nPags(),qual:E.qual?.total});
  const ls=document.getElementById('ls');
  if(ls){const d=document.createElement('div');d.style.marginTop='20px';d.innerHTML=`<button class="btn B w" onclick="docConcluido()">🎓 Ver Documento Completo →</button>`;ls.after(d);}
}

function aSecDOM(i,e,etq,c){
  const p=document.getElementById(`sgp-${i}`);
  const et=document.getElementById(`setq-${i}`);
  const el=document.getElementById(`sg-${i}`);
  if(p)p.className=`sg-p ${e}`;
  if(et){et.className=`etq ${e==='p'?'etq-v':e==='g'?'etq-o':'etq-b'}`;et.style.fontSize='8px';et.textContent=etq;}
  if(el){
    el.className=`sec${e==='p'?' pronto':e==='g'?' ativo':''}`;
    if(e==='g'&&!el.querySelector('.pts')){
      const d=document.createElement('div');d.style.cssText='padding:12px 16px;display:flex;align-items:center;gap:10px;font-family:var(--fm);font-size:10px;color:var(--t3)';
      d.innerHTML='<div class="pts"><span></span><span></span><span></span></div>Academy está a construir…';
      el.appendChild(d);
    }
    if(e==='p'){
      const pts=el.querySelector('.pts');if(pts)pts.closest('div[style]')?.remove();
      if(c){let pv=el.querySelector('.sec-prev');if(!pv){pv=document.createElement('div');pv.className='sec-prev';el.appendChild(pv);}pv.textContent=c.substring(0,110)+'…';}
    }
  }
}
function aBarra(pron,total){
  const pct=Math.round(pron/total*100);
  const b=document.getElementById('barraG');if(b)b.style.width=pct+'%';
  const n=document.getElementById('pctN');if(n)n.textContent=pct+'%';
  const a=document.getElementById('anp');if(a)a.textContent=nPags();
}

async function regenSec(i){
  const el=document.getElementById(`esec-${i}`);
  const btn=el?.querySelectorAll('.ed-sec-btn')?.[0];
  const c=document.getElementById(`sc-${i}`);
  if(btn)btn.textContent='…';
  if(c)c.innerHTML='<div class="pts" style="padding:16px 0"><span></span><span></span><span></span></div>';
  try{
    const cap=E.est[i];
    const tp=TIPOS.find(t=>t.id===E.cfg.tipo)||{n:'Trabalho Académico'};
    const cnt=await chamarAcademy(`Reescreve o capítulo ${cap.num}: "${cap.titulo}" para ${tp.n}. Tema: "${E.cfg.tema}". Mais profundidade académica. Só texto corrido, sem markdown.`,1200);
    E.secs[i].c=cnt;
    if(c)c.innerHTML=cnt.split('\n\n').filter(Boolean).map(p=>`<p>${p}</p>`).join('');
    autoGuardar();
  }catch(e){if(c)c.innerHTML='<p style="color:var(--t3)">Erro. Tenta novamente.</p>';}
  if(btn)btn.textContent='↺';
}

function docConcluido(){
  const el=document.createElement('div');el.id='cel';el.className='cel';el.onclick=()=>{el.remove();irPara('editor');};
  el.innerHTML=`
  <div style="font-size:60px;margin-bottom:24px;animation:flutuar 2.5s ease-in-out infinite;filter:drop-shadow(0 0 28px rgba(30,146,255,.6))">🎓</div>
  <div style="font-family:var(--fd);font-style:italic;font-size:32px;font-weight:300;text-align:center;margin-bottom:8px;color:var(--t1)">Documento concluído</div>
  <div style="font-family:var(--fm);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--b);text-shadow:var(--gb);margin-bottom:18px;text-align:center">● ACADEMY · CONCLUÍDO COM SUCESSO</div>
  <p style="font-family:var(--fd);font-style:italic;font-size:15px;color:var(--t2);text-align:center;margin-bottom:30px;line-height:1.8;max-width:290px">O teu trabalho académico está pronto.<br/>Revisa, edita e exporta em PDF ou Word.</p>
  <button class="btn B" onclick="this.closest('.cel').remove();irPara('editor')">Abrir documento →</button>
  <div style="margin-top:16px;font-family:var(--fm);font-size:9px;color:var(--t3);text-align:center">toca para continuar</div>`;
  document.body.appendChild(el);
  setTimeout(()=>{if(document.getElementById('cel')){el.remove();irPara('editor');}},6000);
}
