<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ACADEMY — Diagnóstico de Integração</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0C0E14;--z1:#111318;--z2:#161922;--z3:#1F2330;
  --b:#43E8A7;--o:#38BDF8;--r:#F87171;--y:#FBBF24;
  --t1:#F8FAFC;--t2:#94A3B8;--t3:#64748B;
  --fm:'JetBrains Mono',monospace;--fu:'Inter',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--t1);font-family:var(--fu);min-height:100vh;padding:24px 16px}
.wrap{max-width:820px;margin:0 auto}

/* Header */
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.07)}
.hdr-logo{width:38px;height:38px;border-radius:9px;background:rgba(67,232,167,.1);border:1px solid rgba(67,232,167,.25);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--b);flex-shrink:0}
.hdr-title{font-size:15px;font-weight:700;color:var(--t1)}
.hdr-sub{font-family:var(--fm);font-size:9px;color:var(--t3);letter-spacing:.1em;margin-top:3px}
.hdr-url{margin-left:auto;font-family:var(--fm);font-size:10px;color:var(--t3);background:var(--z2);padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.07)}

/* Status bar */
.status-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--z2);border-radius:8px;margin-bottom:24px;border:1px solid rgba(255,255,255,.06)}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.idle{background:var(--t3)}
.status-dot.running{background:var(--y);animation:pulse 1s infinite}
.status-dot.ok{background:var(--b)}
.status-dot.fail{background:var(--r)}
.status-msg{font-family:var(--fm);font-size:11px;color:var(--t2);flex:1}
.run-btn{background:var(--b);color:#0A0F1A;border:none;padding:8px 18px;border-radius:7px;font-family:var(--fm);font-size:10px;font-weight:700;letter-spacing:.08em;cursor:pointer;flex-shrink:0;transition:background .15s}
.run-btn:hover{background:#66F3BD}
.run-btn:disabled{background:var(--z3);color:var(--t3);cursor:not-allowed}
.clear-btn{background:transparent;color:var(--t3);border:1px solid rgba(255,255,255,.1);padding:7px 14px;border-radius:7px;font-family:var(--fm);font-size:10px;cursor:pointer;transition:all .15s}
.clear-btn:hover{color:var(--t1);border-color:rgba(255,255,255,.2)}

/* Testes */
.tests{display:flex;flex-direction:column;gap:16px;margin-bottom:28px}
.test-card{background:var(--z1);border:1px solid rgba(255,255,255,.07);border-radius:10px;overflow:hidden}
.test-card.pass{border-color:rgba(67,232,167,.22)}
.test-card.fail{border-color:rgba(248,113,113,.22)}
.test-card.warn{border-color:rgba(251,191,36,.22)}
.test-card.running{border-color:rgba(56,189,248,.22)}

.test-head{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;user-select:none}
.test-badge{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.badge-idle{background:var(--z3);color:var(--t3)}
.badge-run{background:rgba(56,189,248,.15);color:var(--o);animation:pulse 1s infinite}
.badge-pass{background:rgba(67,232,167,.15);color:var(--b)}
.badge-fail{background:rgba(248,113,113,.15);color:var(--r)}
.badge-warn{background:rgba(251,191,36,.15);color:var(--y)}

.test-name{font-size:13px;font-weight:600;color:var(--t1);flex:1}
.test-time{font-family:var(--fm);font-size:9px;color:var(--t3);flex-shrink:0}
.test-arrow{font-size:10px;color:var(--t3);flex-shrink:0;transition:transform .18s}
.test-arrow.open{transform:rotate(180deg)}

.test-body{display:none;border-top:1px solid rgba(255,255,255,.05)}
.test-body.open{display:block}
.test-section{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04)}
.test-section:last-child{border-bottom:none}
.sec-label{font-family:var(--fm);font-size:8px;letter-spacing:.12em;color:var(--t3);margin-bottom:8px;text-transform:uppercase}

/* Terminal / JSON display */
.terminal{background:var(--bg);border-radius:6px;padding:12px;font-family:var(--fm);font-size:11px;line-height:1.7;overflow-x:auto;max-height:280px;overflow-y:auto;border:1px solid rgba(255,255,255,.05)}
.terminal::-webkit-scrollbar{width:3px;height:3px}
.terminal::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.k{color:var(--o)}   /* JSON key */
.s{color:var(--b)}   /* string */
.n{color:var(--y)}   /* number */
.bool{color:#C084FC} /* boolean */
.null{color:var(--r)}
.ok{color:var(--b)}
.err{color:var(--r)}
.warn{color:var(--y)}
.dim{color:var(--t3)}

/* Check list */
.checks{display:flex;flex-direction:column;gap:6px}
.check{display:flex;align-items:flex-start;gap:10px;font-size:12px;color:var(--t2);line-height:1.5}
.check-ic{flex-shrink:0;margin-top:1px;font-size:12px}
.check.pass .check-ic::before{content:'✓';color:var(--b)}
.check.fail .check-ic::before{content:'✗';color:var(--r)}
.check.warn .check-ic::before{content:'⚠';color:var(--y)}
.check.info .check-ic::before{content:'ℹ';color:var(--o)}

/* Summary */
.summary{background:var(--z2);border-radius:10px;padding:20px;border:1px solid rgba(255,255,255,.06);margin-bottom:24px;display:none}
.summary.visible{display:block}
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.sum-cell{text-align:center;padding:12px 8px;background:var(--z3);border-radius:8px}
.sum-n{font-size:24px;font-weight:700;line-height:1;margin-bottom:4px}
.sum-l{font-family:var(--fm);font-size:8px;color:var(--t3);letter-spacing:.1em}
.sum-verdict{padding:12px 16px;border-radius:8px;font-family:var(--fm);font-size:11px;line-height:1.8;letter-spacing:.02em}
.verdict-pass{background:rgba(67,232,167,.06);border:1px solid rgba(67,232,167,.2);color:var(--b)}
.verdict-fail{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.2);color:var(--r)}
.verdict-warn{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);color:var(--y)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@media(max-width:480px){.sum-grid{grid-template-columns:repeat(2,1fr)}.hdr-url{display:none}}
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-logo">A</div>
    <div>
      <div class="hdr-title">ACADEMY — Diagnóstico de Integração</div>
      <div class="hdr-sub">RUNTIME VALIDATOR · NÃO TOCA NO BACKEND</div>
    </div>
    <div class="hdr-url" id="urlDisplay">/api/academy-engine</div>
  </div>

  <!-- Status + Run button -->
  <div class="status-bar">
    <div class="status-dot idle" id="globalDot"></div>
    <div class="status-msg" id="globalMsg">Pronto para executar. Confirma que o Vercel está a correr.</div>
    <button class="clear-btn" onclick="limpar()">Limpar</button>
    <button class="run-btn" id="runBtn" onclick="correrTudo()">▶ Executar Diagnóstico</button>
  </div>

  <!-- Sumário (aparece depois de correr) -->
  <div class="summary" id="summary">
    <div class="sum-grid">
      <div class="sum-cell"><div class="sum-n" id="sTotal" style="color:var(--t1)">0</div><div class="sum-l">TESTES</div></div>
      <div class="sum-cell"><div class="sum-n" id="sPass" style="color:var(--b)">0</div><div class="sum-l">PASS</div></div>
      <div class="sum-cell"><div class="sum-n" id="sFail" style="color:var(--r)">0</div><div class="sum-l">FAIL</div></div>
      <div class="sum-cell"><div class="sum-n" id="sTime" style="color:var(--o)">—</div><div class="sum-l">ms TOTAL</div></div>
    </div>
    <div class="sum-verdict" id="sumVerdict"></div>
  </div>

  <!-- Testes -->
  <div class="tests" id="testList"></div>

</div>

<script>
/* ══ CONFIG ══ */
const ENGINE_URL = '/api/academy-engine';

/* ══ ESTADO ══ */
let running = false;
const resultados = {};

/* ══ DEFINIÇÃO DOS TESTES ══ */
const TESTES = [
  {
    id: 'transport',
    nome: '1. Transporte — Endpoint & CORS',
    desc: 'Verifica se /api/academy-engine existe, responde e aceita POST.',
    run: testarTransporte,
  },
  {
    id: 'ping',
    nome: '2. Ping — Contrato mínimo',
    desc: 'Request real: { action:"ping", payload:{} } → { ok:true, data:{ resposta:"pong" } }',
    run: testarPing,
  },
  {
    id: 'envelope',
    nome: '3. Envelope — Estrutura da resposta',
    desc: 'Valida que envelope.ok, envelope.data.resposta e envelope.meta existem correctamente.',
    run: testarEnvelope,
  },
  {
    id: 'chat',
    nome: '4. Chat — Chamada real de IA',
    desc: 'Envia pedido real ao modelo. Verifica tempo de resposta e qualidade da resposta.',
    run: testarChat,
  },
  {
    id: 'payload_fields',
    nome: '5. Payload — Campos obrigatórios em falta',
    desc: 'Envia payload incompleto. Backend deve retornar erro 400 limpo (não crash).',
    run: testarPayloadIncompleto,
  },
  {
    id: 'content_type',
    nome: '6. Content-Type — JSON correctamente enviado',
    desc: 'Confirma que o header Content-Type está definido e payload não é double-stringified.',
    run: testarContentType,
  },
  {
    id: 'resposta_string',
    nome: '7. Parsing — Resposta string vs objecto',
    desc: 'Verifica que callAcademyAPI retorna string directa para acções de texto (gerar_capitulo, chat).',
    run: testarParsing,
  },
  {
    id: 'service_worker',
    nome: '8. Service Worker — Cache não intercepta API',
    desc: 'Confirma que /api/* não está a ser servido em cache pelo SW.',
    run: testarServiceWorker,
  },
];

/* ══ RENDER DOS CARDS ══ */
function renderCards() {
  const list = document.getElementById('testList');
  list.innerHTML = TESTES.map(t => `
  <div class="test-card" id="card-${t.id}">
    <div class="test-head" onclick="togBody('${t.id}')">
      <div class="test-badge badge-idle" id="badge-${t.id}">—</div>
      <div>
        <div class="test-name">${t.nome}</div>
        <div style="font-family:var(--fm);font-size:9px;color:var(--t3);margin-top:3px">${t.desc}</div>
      </div>
      <div class="test-time" id="time-${t.id}"></div>
      <div class="test-arrow" id="arrow-${t.id}">▾</div>
    </div>
    <div class="test-body" id="body-${t.id}">
      <div id="content-${t.id}" style="padding:14px 16px;font-family:var(--fm);font-size:10px;color:var(--t3)">Aguarda execução…</div>
    </div>
  </div>`).join('');
}

function togBody(id) {
  const body = document.getElementById(`body-${id}`);
  const arrow = document.getElementById(`arrow-${id}`);
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function abrirBody(id) {
  document.getElementById(`body-${id}`).classList.add('open');
  document.getElementById(`arrow-${id}`).classList.add('open');
}

/* ══ UTILITÁRIOS ══ */
function jsonHL(obj) {
  const s = JSON.stringify(obj, null, 2);
  return s
    .replace(/(".*?")(\s*:)/g, '<span class="k">$1</span>$2')
    .replace(/: (".*?")/g, ': <span class="s">$1</span>')
    .replace(/: (\d+\.?\d*)/g, ': <span class="n">$1</span>')
    .replace(/: (true|false)/g, ': <span class="bool">$1</span>')
    .replace(/: (null)/g, ': <span class="null">$1</span>');
}

function truncate(obj, maxLen = 600) {
  const s = JSON.stringify(obj, null, 2);
  return s.length > maxLen ? s.slice(0, maxLen) + '\n…[truncado]' : s;
}

function setCard(id, estado, timeMs) {
  const card = document.getElementById(`card-${id}`);
  const badge = document.getElementById(`badge-${id}`);
  const timeEl = document.getElementById(`time-${id}`);
  card.className = 'test-card ' + estado;
  const icons = { pass: '✓', fail: '✗', warn: '⚠', running: '…' };
  const cls = { pass: 'badge-pass', fail: 'badge-fail', warn: 'badge-warn', running: 'badge-run' };
  badge.className = `test-badge ${cls[estado] || 'badge-idle'}`;
  badge.textContent = icons[estado] || '—';
  if (timeMs !== undefined) timeEl.textContent = `${timeMs}ms`;
}

function setContent(id, html) {
  document.getElementById(`content-${id}`).innerHTML = html;
}

function checks(list) {
  return `<div class="checks">${list.map(([estado, txt]) =>
    `<div class="check ${estado}"><div class="check-ic"></div><span>${txt}</span></div>`
  ).join('')}</div>`;
}

function reqBlock(method, url, body) {
  return `<div class="test-section">
    <div class="sec-label">Request enviado</div>
    <div class="terminal"><span class="k">${method}</span> <span class="s">${url}</span>
<span class="dim">Content-Type:</span> <span class="s">application/json</span>

${jsonHL(body)}</div>
  </div>`;
}

function resBlock(status, data, timeMs) {
  const ok = status >= 200 && status < 300;
  return `<div class="test-section">
    <div class="sec-label">Response recebida <span style="color:var(--t3)">(${timeMs}ms)</span></div>
    <div class="terminal">HTTP <span class="${ok ? 'ok' : 'err'}">${status}</span>

${jsonHL(JSON.parse(truncate(data)))}</div>
  </div>`;
}

/* ══ CHAMADA REAL ══ */
async function callReal(action, payload, timeout = 30000) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), timeout);
  const t0 = Date.now();
  let status = 0;
  let data = null;
  let error = null;
  try {
    const resp = await fetch(ENGINE_URL, {
      method: 'POST',
      mode: 'cors',
      signal: ctrl.signal,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, payload }),
    });
    status = resp.status;
    const text = await resp.text();
    try { data = JSON.parse(text); } catch { data = { _raw: text.slice(0, 500) }; }
  } catch (e) {
    error = e;
  } finally {
    clearTimeout(tid);
  }
  return { status, data, error, ms: Date.now() - t0 };
}

/* ══ TESTES INDIVIDUAIS ══ */

async function testarTransporte(id) {
  setCard(id, 'running');
  setContent(id, '<span style="color:var(--o)">A testar ligação…</span>');
  const t0 = Date.now();

  /* Testa OPTIONS (CORS preflight) */
  let corsOk = false;
  try {
    const r = await fetch(ENGINE_URL, { method: 'OPTIONS', mode: 'cors' });
    corsOk = r.status < 400;
  } catch {}

  /* Testa POST básico */
  const r = await callReal('ping', {});
  const ms = Date.now() - t0;

  const items = [
    [r.error?.name === 'AbortError' ? 'fail' : r.error ? 'fail' : 'pass',
      r.error ? `Erro de rede: ${r.error.message}` : 'Endpoint acessível — sem erro de rede'],
    [r.status === 0 && r.error ? 'fail' : r.status >= 200 && r.status < 500 ? 'pass' : 'fail',
      `HTTP Status: ${r.status || 'sem resposta'}`],
    [corsOk ? 'pass' : 'warn', `CORS preflight: ${corsOk ? 'OK' : 'sem resposta / bloqueado'}`],
    [r.error?.message?.includes('Failed to fetch') ? 'fail' : 'pass',
      r.error?.message?.includes('Failed to fetch') ? '⛔ "Failed to fetch" — Vercel não está a correr ou URL errada' : 'Sem "Failed to fetch"'],
  ];

  const estado = items.some(i => i[0] === 'fail') ? 'fail' : items.some(i => i[0] === 'warn') ? 'warn' : 'pass';
  setCard(id, estado, ms);

  setContent(id, `
    ${reqBlock('POST', ENGINE_URL, { action: 'ping', payload: {} })}
    <div class="test-section">
      <div class="sec-label">Verificações</div>
      ${checks(items)}
    </div>
  `);
  abrirBody(id);
  return estado === 'pass';
}

async function testarPing(id) {
  setCard(id, 'running');
  const payload = {};
  const r = await callReal('ping', payload);

  const items = [
    [r.error ? 'fail' : 'pass', r.error ? `Erro: ${r.error.message}` : 'Request completou sem erro de rede'],
    [r.status === 200 ? 'pass' : 'fail', `HTTP 200: ${r.status === 200 ? 'SIM' : 'NÃO — recebido ' + r.status}`],
    [r.data?.ok === true ? 'pass' : 'fail', `envelope.ok = ${r.data?.ok} (esperado: true)`],
    [r.data?.data?.resposta === 'pong' ? 'pass' : 'fail',
      `envelope.data.resposta = "${r.data?.data?.resposta}" (esperado: "pong")`],
    [r.data?.meta?.version ? 'pass' : 'warn', `envelope.meta.version = ${r.data?.meta?.version || 'ausente'}`],
    [r.ms < 3000 ? 'pass' : 'warn', `Tempo de resposta: ${r.ms}ms ${r.ms < 3000 ? '(ok)' : '(lento)'}`],
  ];

  const estado = items.some(i => i[0] === 'fail') ? 'fail' : items.some(i => i[0] === 'warn') ? 'warn' : 'pass';
  setCard(id, estado, r.ms);
  setContent(id, `
    ${reqBlock('POST', ENGINE_URL, { action: 'ping', payload: {} })}
    ${r.data ? resBlock(r.status, r.data, r.ms) : `<div class="test-section"><span class="err">Sem resposta: ${r.error?.message}</span></div>`}
    <div class="test-section"><div class="sec-label">Verificações</div>${checks(items)}</div>
  `);
  return estado !== 'fail';
}

async function testarEnvelope(id) {
  setCard(id, 'running');
  const r = await callReal('ping', {});

  const d = r.data || {};
  const items = [
    [typeof d.ok === 'boolean' ? 'pass' : 'fail', `envelope.ok existe e é boolean: ${typeof d.ok}`],
    [d.action !== undefined ? 'pass' : 'warn', `envelope.action existe: "${d.action}"`],
    [d.data !== undefined ? 'pass' : 'fail', `envelope.data existe: ${d.data !== undefined}`],
    [d.data?.resposta !== undefined ? 'pass' : 'fail', `envelope.data.resposta existe: ${JSON.stringify(d.data?.resposta)}`],
    [d.error === null || d.error === undefined ? 'pass' : 'warn', `envelope.error = ${JSON.stringify(d.error)} (esperado: null)`],
    [d.meta?.model !== undefined ? 'pass' : 'warn', `envelope.meta.model = "${d.meta?.model}"`],
    [d.meta?.request_id !== undefined ? 'pass' : 'warn', `envelope.meta.request_id = "${d.meta?.request_id}"`],
    /* Verifica double-string */
    [typeof d.data?.resposta !== 'string' || !d.data?.resposta?.startsWith('{') ? 'pass' : 'warn',
      'Resposta não é JSON em string (double-stringify)'],
  ];

  const estado = items.some(i => i[0] === 'fail') ? 'fail' : items.some(i => i[0] === 'warn') ? 'warn' : 'pass';
  setCard(id, estado, r.ms);
  setContent(id, `
    <div class="test-section">
      <div class="sec-label">Estrutura real recebida</div>
      <div class="terminal">${jsonHL(d)}</div>
    </div>
    <div class="test-section"><div class="sec-label">Verificações de envelope</div>${checks(items)}</div>
  `);
  return estado !== 'fail';
}

async function testarChat(id) {
  setCard(id, 'running');
  setContent(id, '<span style="color:var(--o)">A chamar modelo IA (pode demorar 5-15s)…</span>');
  const reqPayload = { pedido: 'Em uma frase: o que é uma monografia?' };
  const r = await callReal('chat', reqPayload, 45000);
  const resposta = r.data?.data?.resposta;

  const items = [
    [r.error ? 'fail' : 'pass', r.error ? `Erro: ${r.error.message}` : 'Request completou'],
    [r.status === 200 ? 'pass' : 'fail', `HTTP 200: ${r.status}`],
    [r.data?.ok ? 'pass' : 'fail', `envelope.ok = ${r.data?.ok}`],
    [typeof resposta === 'string' && resposta.length > 10 ? 'pass' : 'fail',
      `Resposta é string não-vazia (${typeof resposta}, ${String(resposta).length} chars)`],
    [r.ms < 20000 ? 'pass' : 'warn', `Tempo: ${r.ms}ms ${r.ms > 15000 ? '(lento — modelo sobrecarregado?)' : ''}`],
    [r.data?.meta?.model ? 'pass' : 'warn', `Modelo usado: ${r.data?.meta?.model || 'não reportado'}`],
  ];

  const estado = items.some(i => i[0] === 'fail') ? 'fail' : items.some(i => i[0] === 'warn') ? 'warn' : 'pass';
  setCard(id, estado, r.ms);
  setContent(id, `
    ${reqBlock('POST', ENGINE_URL, { action: 'chat', payload: reqPayload })}
    <div class="test-section">
      <div class="sec-label">Resposta da IA</div>
      <div class="terminal"><span class="${typeof resposta === 'string' && resposta.length > 5 ? 'ok' : 'err'}">${resposta || '(vazia/ausente)'}</span></div>
    </div>
    <div class="test-section"><div class="sec-label">Verificações</div>${checks(items)}</div>
  `);
  return estado !== 'fail';
}

async function testarPayloadIncompleto(id) {
  setCard(id, 'running');
  /* Envia payload sem campo obrigatório — backend deve retornar 400 ou 500 com mensagem clara */
  const r = await callReal('plano_academico', { tema: 'Teste' }); /* falta tipoTrabalho e nivel */

  const items = [
    [r.status >= 400 && r.status < 600 ? 'pass' : 'warn',
      `Backend retornou erro HTTP ${r.status} para payload incompleto (esperado: 4xx ou 5xx)`],
    [r.data?.ok === false ? 'pass' : 'warn', `envelope.ok = false: ${r.data?.ok}`],
    [r.data?.error && typeof r.data.error === 'string' ? 'pass' : 'warn',
      `Mensagem de erro clara: "${r.data?.error?.slice(0, 80) || 'ausente'}"`],
    [!r.data?.data?.resposta ? 'pass' : 'warn',
      'data.resposta está vazio/ausente (correcto para erro)'],
  ];

  const estado = items.every(i => i[0] === 'pass') ? 'pass' : items.some(i => i[0] === 'fail') ? 'fail' : 'warn';
  setCard(id, estado, r.ms);
  setContent(id, `
    ${reqBlock('POST', ENGINE_URL, { action: 'plano_academico', payload: { tema: 'Teste' } })}
    ${r.data ? resBlock(r.status, r.data, r.ms) : `<div class="test-section"><span class="err">Sem resposta</span></div>`}
    <div class="test-section"><div class="sec-label">Verificações</div>${checks(items)}</div>
  `);
  return true; /* este teste não é bloqueante */
}

async function testarContentType(id) {
  setCard(id, 'running');

  /* Simula o que callAcademyAPI faz — verifica se payload chega correcto */
  const testPayload = { action: 'ping', payload: {} };
  const bodyStr = JSON.stringify(testPayload);
  const isDoubleStringified = typeof JSON.parse(bodyStr) === 'string';
  const hasContentType = true; /* sempre presente em callAcademyAPI */

  const r = await callReal('ping', {});
  /* Analisa se o backend recebeu correctamente */
  const backendRecebeuOk = r.data?.ok === true;

  const items = [
    ['pass', `Content-Type: application/json — sempre presente em callAcademyAPI`],
    [!isDoubleStringified ? 'pass' : 'fail',
      `Payload não tem double-stringify: JSON.stringify({action, payload}) = ${bodyStr.slice(0, 80)}`],
    [testPayload.action && testPayload.payload !== undefined ? 'pass' : 'fail',
      `Envelope { action, payload } correcto`],
    [backendRecebeuOk ? 'pass' : 'fail',
      `Backend confirmou recepção correcta: ok=${r.data?.ok}`],
    /* Verifica se undefined está a ser enviado */
    [!bodyStr.includes('undefined') ? 'pass' : 'warn',
      `Sem "undefined" no body (pode silenciosamente remover campos)`],
  ];

  const estado = items.some(i => i[0] === 'fail') ? 'fail' : items.some(i => i[0] === 'warn') ? 'warn' : 'pass';
  setCard(id, estado, r.ms);
  setContent(id, `
    <div class="test-section">
      <div class="sec-label">Body real stringify</div>
      <div class="terminal">${bodyStr.slice(0, 400)}</div>
    </div>
    <div class="test-section"><div class="sec-label">Verificações</div>${checks(items)}</div>
  `);
  return estado !== 'fail';
}

async function testarParsing(id) {
  setCard(id, 'running');
  const r = await callReal('chat', { pedido: 'ok' }, 30000);
  const envelope = r.data || {};
  const resposta = envelope?.data?.resposta;

  const items = [
    [typeof resposta === 'string' ? 'pass' : 'fail',
      `chat retorna string: typeof = ${typeof resposta}`],
    [typeof resposta === 'string' && !resposta.startsWith('{"') ? 'pass' : 'warn',
      `Não é JSON em string: ${String(resposta).slice(0, 60)}`],
    /* Verificar se frontend consegue usar directamente */
    [typeof resposta === 'string' && resposta.length > 0 ? 'pass' : 'fail',
      `Pode usar directamente como string (length=${String(resposta||'').length})`],
    /* Para acções JSON (plano_academico retorna objecto) */
    ['info', 'Nota: plano_academico, gerar_mea etc. retornam objecto — frontend usa typeof raw===\'object\'?raw:JSON.parse(raw)'],
  ];

  const estado = items.filter(i=>i[0]!=='info').some(i => i[0] === 'fail') ? 'fail' : 'pass';
  setCard(id, estado, r.ms);
  setContent(id, `
    <div class="test-section">
      <div class="sec-label">Tipo de envelope.data.resposta</div>
      <div class="terminal">typeof resposta = <span class="${typeof resposta === 'string' ? 'ok' : 'err'}">"${typeof resposta}"</span>
valor = <span class="s">"${String(resposta || '').slice(0, 200)}"</span></div>
    </div>
    <div class="test-section"><div class="sec-label">Verificações</div>${checks(items)}</div>
  `);
  return estado !== 'fail';
}

async function testarServiceWorker(id) {
  setCard(id, 'running');
  const swActivo = 'serviceWorker' in navigator && navigator.serviceWorker.controller !== null;
  const swRegistado = 'serviceWorker' in navigator;

  let swIntercept = false;
  /* Faz dois requests e compara tempos — se SW estiver a cachear, o 2º será muito mais rápido */
  const r1 = await callReal('ping', {});
  const r2 = await callReal('ping', {});
  const diffRatio = r1.ms > 0 ? r2.ms / r1.ms : 1;
  /* Se 2º request for >10x mais rápido, provavelmente veio de cache */
  swIntercept = diffRatio < 0.1 && r2.ms < 50;

  const items = [
    [swRegistado ? 'info' : 'info', `Service Worker suportado: ${swRegistado}`],
    [swActivo ? 'warn' : 'pass', `SW controller activo: ${swActivo} ${swActivo ? '— pode interferir' : '— ok'}`],
    [!swIntercept ? 'pass' : 'warn',
      `Dois pings: ${r1.ms}ms → ${r2.ms}ms ${swIntercept ? '⚠ pode estar em cache' : '— tempos normais'}`],
    ['info', 'sw.js deve ter Network Only para /api/* (já configurado)'],
  ];

  const estado = swIntercept ? 'warn' : 'pass';
  setCard(id, estado, r1.ms);
  setContent(id, `
    <div class="test-section">
      <div class="sec-label">Estado do Service Worker</div>
      <div class="terminal">serviceWorker.controller = <span class="${swActivo ? 'warn' : 'ok'}">${swActivo}</span>
Ping 1: <span class="n">${r1.ms}ms</span>
Ping 2: <span class="n">${r2.ms}ms</span>
Ratio:  <span class="${swIntercept ? 'warn' : 'ok'}">${diffRatio.toFixed(2)}</span></div>
    </div>
    <div class="test-section"><div class="sec-label">Verificações</div>${checks(items)}</div>
  `);
  return true;
}

/* ══ RUNNER PRINCIPAL ══ */
async function correrTudo() {
  if (running) return;
  running = true;
  document.getElementById('runBtn').disabled = true;
  document.getElementById('globalDot').className = 'status-dot running';
  document.getElementById('globalMsg').textContent = 'A executar diagnóstico…';
  document.getElementById('summary').classList.remove('visible');

  const t0 = Date.now();
  let pass = 0, fail = 0;

  for (const teste of TESTES) {
    document.getElementById('globalMsg').textContent = `A executar: ${teste.nome}…`;
    setCard(teste.id, 'running');
    try {
      const ok = await teste.run(teste.id);
      if (ok) pass++; else fail++;
    } catch (e) {
      setCard(teste.id, 'fail');
      setContent(teste.id, `<span class="err">Excepção inesperada: ${e.message}</span>`);
      fail++;
    }
    await new Promise(r => setTimeout(r, 200)); /* pequena pausa visual */
  }

  const totalMs = Date.now() - t0;
  const total = TESTES.length;
  const warn = total - pass - fail;

  /* Sumário */
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sPass').textContent = pass;
  document.getElementById('sFail').textContent = fail;
  document.getElementById('sTime').textContent = totalMs;

  const verdict = document.getElementById('sumVerdict');
  if (fail === 0 && warn === 0) {
    verdict.className = 'sum-verdict verdict-pass';
    verdict.innerHTML = '✅ Sistema totalmente operacional. Integração frontend → backend validada em runtime. Podes fazer deploy com confiança.';
    document.getElementById('globalDot').className = 'status-dot ok';
    document.getElementById('globalMsg').textContent = `Diagnóstico completo — ${pass}/${total} testes passed (${totalMs}ms)`;
  } else if (fail === 0) {
    verdict.className = 'sum-verdict verdict-warn';
    verdict.innerHTML = `⚠ ${pass} testes passed, ${warn} avisos. Sistema funcional mas com pontos a monitorizar. Verifica os cards com ⚠.`;
    document.getElementById('globalDot').className = 'status-dot ok';
    document.getElementById('globalMsg').textContent = `Diagnóstico completo — avisos encontrados`;
  } else {
    verdict.className = 'sum-verdict verdict-fail';
    verdict.innerHTML = `❌ ${fail} teste(s) falharam. Integração bloqueada. Expande os cards com ✗ para ver o erro exacto.`;
    document.getElementById('globalDot').className = 'status-dot fail';
    document.getElementById('globalMsg').textContent = `Diagnóstico completo — ${fail} falha(s) encontrada(s)`;
  }

  document.getElementById('summary').classList.add('visible');
  document.getElementById('runBtn').disabled = false;
  running = false;
}

function limpar() {
  document.getElementById('summary').classList.remove('visible');
  renderCards();
  document.getElementById('globalDot').className = 'status-dot idle';
  document.getElementById('globalMsg').textContent = 'Pronto para executar. Confirma que o Vercel está a correr.';
}

/* ══ INIT ══ */
renderCards();
document.getElementById('urlDisplay').textContent = ENGINE_URL;
