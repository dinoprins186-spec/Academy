<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111520"/>
      <stop offset="100%" stop-color="#0C0E14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#43E8A7"/>
      <stop offset="100%" stop-color="#2BB57E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>

  <!-- Subtle top glow -->
  <ellipse cx="96" cy="20" rx="70" ry="28" fill="rgba(67,232,167,0.07)"/>

  <!-- Border ring -->
  <rect width="192" height="192" rx="38" fill="none" stroke="rgba(67,232,167,0.12)" stroke-width="1.5"/>

  <!-- "A" lettermark — geometric, premium -->
  <!-- Left leg -->
  <path d="M54 148 L96 48 L138 148" stroke="url(#accent)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <!-- Crossbar -->
  <line x1="69" y1="112" x2="123" y2="112" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>

  <!-- Corner dot — institutional mark -->
  <circle cx="154" cy="48" r="7" fill="#43E8A7" opacity="0.9"/>
</svg>
