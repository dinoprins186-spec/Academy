<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111520"/>
      <stop offset="100%" stop-color="#0C0E14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#43E8A7"/>
      <stop offset="100%" stop-color="#2BB57E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Subtle top glow -->
  <ellipse cx="256" cy="52" rx="190" ry="75" fill="rgba(67,232,167,0.06)"/>

  <!-- Border ring -->
  <rect width="512" height="512" rx="100" fill="none" stroke="rgba(67,232,167,0.10)" stroke-width="2.5"/>

  <!-- "A" lettermark — geometric, premium -->
  <path d="M144 396 L256 128 L368 396" stroke="url(#accent)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <!-- Crossbar -->
  <line x1="185" y1="300" x2="327" y2="300" stroke="url(#accent)" stroke-width="28" stroke-linecap="round"/>

  <!-- Corner dot -->
  <circle cx="410" cy="128" r="18" fill="#43E8A7" opacity="0.9"/>
</svg>
