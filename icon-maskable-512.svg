<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111520"/>
      <stop offset="100%" stop-color="#0C0E14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#43E8A7"/>
      <stop offset="100%" stop-color="#2BB57E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <ellipse cx="256" cy="52" rx="200" ry="80" fill="rgba(67,232,167,0.06)"/>

  <!-- Content in safe zone (51px padding each side = 410x410 area) -->
  <path d="M164 420 L256 164 L348 420" stroke="url(#accent)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <line x1="200" y1="328" x2="312" y2="328" stroke="url(#accent)" stroke-width="24" stroke-linecap="round"/>

  <circle cx="365" cy="156" r="15" fill="#43E8A7" opacity="0.9"/>
</svg>
